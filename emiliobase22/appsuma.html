<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aplicacion en javascript</title>
</head>
<body>
    <h1>aplicacion de numeros </h1>
    <form action="">
        <div>
            <label for="num1">numero 1 guapa</label>
            <input type="text" name="num1" id="num1">

        </div>
         <div>
            <label for="num2">numero 2 guapa</label>
            <input type="text" name="num2" id="num2">
      
        </div>

         <div>
            <label for="operacion">operacion:</label>
            <select name="operacion" id="operacion">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">*</option>
                <option value="/">/</option>
            </select>
            
        </div>

        <div>
            <label for="resultado">resultado:</label>
            <input type="text" name="resultado" id="resultado">
      
        </div>
        <button id="boton">calcular</button>
    </form>    
    <script src="appsuma.js"></script>
</body>
</html>
