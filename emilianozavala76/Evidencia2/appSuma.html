<head>

    <title>Aplicacion en JavaScript</title>
</head>
<body>
    <h1>Aplicacion suma de numeros</h1>

        <div>
            <label for="num1">Numero 1:</label>

        </div>
        <div>

        <button id="botonCalcular">Calcular</button>
