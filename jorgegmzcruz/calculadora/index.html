<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/estilo.css">
    <title>Suma en Javascript</title>
    
</head>
<body>
    <h1>Aplicacion suma de numeros</h1>
    <form action="">
        <div>
            <label for="num1">Numero 1:</label>
            <input type="number" name="num1" id="num1">
        </div>
        <div></div>

        <div>
            <label for="num2">Numero 2:</label>
            <input type="number" name="num2" id="num2">
        </div>
        <div>
            <label for="operacion">Operacion: </label>
            <input type="text" name="operacion" id="operacion">
        </div>

        <div>
            <label for="result">Resultado:</label>
            <input type="number" name="result" id="result">
        </div>

        <button id="botonSuma">Calcular</button>
    </form>
    <!--este va al ultimo para que programe sobre los elementos-->
    <script src="js/app.js"></script>
</body>
</html>
